<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tauri + React + Typescript</title>
  </head>

  <body>
    <div id="root"></div>

    <!-- Off-screen mount point; the YouTube IFrame Player API replaces this with its player iframe.
         YouTube refuses to play in a zero-size/visibility:hidden iframe, so it is rendered at a real
         size but positioned off-screen instead of hidden. -->
    <div id="yt-player" style="position: fixed; left: -10000px; top: 0; width: 320px; height: 180px; border: 0; pointer-events: none;"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

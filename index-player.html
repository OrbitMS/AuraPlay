<script>
  let player = null;
  let isReady = false;
  let commandQueue = [];

  window.onYouTubeIframeAPIReady = function() {
    player = new YT.Player('yt-player', {
      height: '1', width: '1',
      events: {
        'onReady': (event) => {
          isReady = true;
          // Process queued commands
          while (commandQueue.length > 0) {
            processCommand(commandQueue.shift());
          }
        }
      }
    });
  };

  function processCommand(payload) {
    if (!payload || !player) return;
    const { command, videoId } = payload;
    if (command === 'play') player.loadVideoById({ videoId });
    // ... handle other commands
  }

  // Inside the listen('audio-control') block:
  listen('audio-control', (e) => {
    if (!isReady) {
      commandQueue.push(e.payload);
    } else {
      processCommand(e.payload);
    }
  });
</script>

<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="85%">
      <stop offset="0%"  stop-color="#22222d"/>
      <stop offset="46%" stop-color="#131319"/>
      <stop offset="100%" stop-color="#070709"/>
    </radialGradient>

    <linearGradient id="gold" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%"   stop-color="#f6dd8c"/>
      <stop offset="42%"  stop-color="#e8c76a"/>
      <stop offset="100%" stop-color="#c39f43"/>
    </linearGradient>

    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#e8c76a" stop-opacity="0.55"/>
      <stop offset="55%"  stop-color="#c9a84c" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>

    <filter id="drop" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="24" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Rounded tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#bg)"/>
  <!-- Top sheen -->
  <rect x="0" y="0" width="1024" height="512" rx="232" ry="232" fill="#ffffff" opacity="0.025"/>
  <!-- Gold hairline border -->
  <rect x="9" y="9" width="1006" height="1006" rx="225" ry="225" fill="none"
        stroke="#c9a84c" stroke-opacity="0.25" stroke-width="3"/>

  <!-- Aura glow + concentric rings -->
  <circle cx="512" cy="512" r="392" fill="url(#aura)"/>
  <circle cx="512" cy="512" r="340" fill="none" stroke="#c9a84c" stroke-opacity="0.14" stroke-width="3"/>
  <circle cx="512" cy="512" r="276" fill="none" stroke="#c9a84c" stroke-opacity="0.10" stroke-width="3"/>
  <circle cx="512" cy="512" r="214" fill="none" stroke="#c9a84c" stroke-opacity="0.07" stroke-width="3"/>

  <!-- Play triangle (rounded) -->
  <g filter="url(#drop)">
    <path d="M 420 352 L 700 512 L 420 672 Z"
          fill="url(#gold)" stroke="url(#gold)" stroke-width="46"
          stroke-linejoin="round" stroke-linecap="round"/>
  </g>
</svg>
